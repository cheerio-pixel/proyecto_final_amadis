<ion-content class="ion-padding">
    <div class="login-container">
        <!-- Logo and Header -->
        <div class="logo-container">
            <img src="assets/images/uasd-logo.png" alt="UASD Logo">
            <h1>Bienvenido</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <!-- Login Form -->
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
            <ion-item class="form-item">
                <ion-label position="floating">Usuario</ion-label>
                <ion-input formControlName="username" type="text" autocomplete="username" placeholder="">
                </ion-input>
                <ion-note slot="error" *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid">
                    {{ getErrorMessage('username') }}
                </ion-note>
            </ion-item>

            <ion-item class="form-item">
                <ion-label position="floating">Contraseña</ion-label>
                <ion-input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder=""
                    autocomplete="current-password">
                </ion-input>
                <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
                    <ion-icon [name]="showPassword ? 'eye-off' : 'eye'"></ion-icon>
                </ion-button>
                <ion-note slot="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                    {{ getErrorMessage('password') }}
                </ion-note>
            </ion-item>

            <!-- Login Button -->
            <ion-button expand="block" type="submit" class="login-button" [disabled]="loginForm.invalid">
                Iniciar Sesión
            </ion-button>

            <!-- Password Recovery -->
            <ion-button expand="block" fill="clear" class="forgot-password-button" (click)="forgotPassword()">
                ¿Olvidaste tu contraseña?
            </ion-button>
        </form>

        <!-- Registration Section -->
        <div class="registration-section">
            <ion-text color="medium">¿No tienes una cuenta?</ion-text>
            <ion-button expand="block" fill="outline" class="register-button" (click)="openRegistration()">
                Estudia con Nosotros
            </ion-button>
        </div>
    </div>
</ion-content>
