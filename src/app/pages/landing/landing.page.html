<!-- src/app/pages/landing/landing.page.html -->
<ion-content class="ion-padding">
  <!-- Header -->
  <div class="header-container">
    <img src="assets/images/uasd-logo.png" alt="UASD Logo" class="logo">
    <h1>Universidad Autónoma de Santo Domingo</h1>
  </div>

  <!-- Main Content -->
  <swiper-container [loop]="true"
                    autoplay="true">
      <swiper-slide *ngFor="let slide of slides">
      <div class="slide-container">
        <img *ngIf="slide.image" [src]="slide.image" [alt]="slide.title">
        <h2>{{slide.title}}</h2>
        <p>{{slide.description}}</p>
      </div>
    </swiper-slide>
  </swiper-container>

  <!-- Quick Info Cards -->
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Historia</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            Fundada en 1538, la UASD es la universidad más antigua del Nuevo Mundo.
          </ion-card-content>
        </ion-card>
      </ion-col>
      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Excelencia Académica</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            Ofrecemos programas académicos de alta calidad en diversas áreas del conocimiento.
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <!-- Login Button -->
  <div class="login-container">
    <ion-button expand="block" (click)="goToLogin()" class="login-button">
      <ion-icon name="log-in-outline" slot="start"></ion-icon>
      Acceder a la Aplicación
    </ion-button>
  </div>
</ion-content>
